<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Chess Online!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #312e2b;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .hero-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            max-width: 1000px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        @media (max-width: 800px) {
            .hero-container {
                flex-direction: column;
                text-align: center;
            }
        }

        .hero-text h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0 0 15px 0;
            line-height: 1.1;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .hero-text p {
            font-size: 1.2rem;
            color: #a7a6a2;
            margin: 0 0 40px 0;
        }

        .btn-play {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #81b64c;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            text-decoration: none;
            padding: 20px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 0 #537133;
            transition: all 0.15s ease;
        }

        .btn-play:hover {
            background-color: #8bc34a;
            transform: translateY(2px);
            box-shadow: 0 6px 0 #537133;
        }

        .btn-play:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #537133;
        }

        .board-wrapper {
            position: relative;
            width: 450px;
            height: 450px;
            border-radius: 8px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            background-color: #ebecd0;
            overflow: hidden;
            flex-shrink: 0;
        }

        @media (max-width: 500px) {
            .board-wrapper {
                width: 90vw;
                height: 90vw;
            }
        }

        .square {
            position: absolute;
            width: 12.5%;
            height: 12.5%;
        }
        .square.black { background-color: #739552; }
        .square.white { background-color: #ebecd0; }

        .piece {
            position: absolute;
            width: 12.5%;
            height: 12.5%;
            background-size: 85%;
            background-repeat: no-repeat;
            background-position: center;
            transition: top 0.4s cubic-bezier(0.25, 0.1, 0.25, 1), left 0.4s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.3s;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="hero-container">
        <div class="board-wrapper" id="demo-board"></div>
        <div class="hero-text">
            <h1>Play Chess<br>Online <span style="color: #739552;">Now!</span></h1>
            <p>Join millions of players on the #1 rated app.</p>
            <a href="index.html" class="btn-play">Play Now</a>
        </div>
    </div>

    <script>
        const board = document.getElementById('demo-board');
        let pieceMap = {};

        const createPiece = (color, type, r, c) => {
            const piece = document.createElement('div');
            piece.className = 'piece';
            piece.style.backgroundImage = `url('./asserts/${color}${type}.png')`;
            piece.style.top = (r * 12.5) + '%';
            piece.style.left = (c * 12.5) + '%';
            board.appendChild(piece);
            return piece;
        };

        const initBoard = () => {
            board.innerHTML = '';
            // Render Squares
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    const sq = document.createElement('div');
                    sq.className = 'square ' + ((r+c)%2 === 0 ? 'white' : 'black');
                    sq.style.top = (r * 12.5) + '%';
                    sq.style.left = (c * 12.5) + '%';
                    board.appendChild(sq);
                }
            }

            pieceMap = {};
            const setup = [
                ['Rook','Horse','Bishop','Queen','King','Bishop','Horse','Rook'],
                ['Pawn','Pawn','Pawn','Pawn','Pawn','Pawn','Pawn','Pawn']
            ];
            
            for(let r=0; r<2; r++) {
                for(let c=0; c<8; c++) pieceMap[`${r},${c}`] = createPiece('Black', setup[r][c], r, c);
            }
            for(let r=6; r<8; r++) {
                for(let c=0; c<8; c++) pieceMap[`${r},${c}`] = createPiece('White', setup[7-r][c], r, c);
            }
        };

        // Scholar's Mate sequence
        const sequence = [
            [6,4, 4,4], // e4
            [1,4, 3,4], // e5
            [7,5, 4,2], // Bc4
            [0,1, 2,2], // Nc6
            [7,3, 3,7], // Qh5
            [0,6, 2,5], // Nf6
            [3,7, 1,5]  // Qxf7#
        ];

        let step = 0;
        initBoard();

        setInterval(() => {
            if (step < sequence.length) {
                const [r1, c1, r2, c2] = sequence[step];
                const piece = pieceMap[`${r1},${c1}`];
                if (piece) {
                    const target = pieceMap[`${r2},${c2}`];
                    if (target) target.style.opacity = '0'; // Capture
                    
                    piece.style.top = (r2 * 12.5) + '%';
                    piece.style.left = (c2 * 12.5) + '%';
                    pieceMap[`${r2},${c2}`] = piece;
                    pieceMap[`${r1},${c1}`] = null;
                }
                step++;
            } else {
                setTimeout(() => {
                    initBoard();
                    step = 0;
                }, 1000); // Pause on Checkmate before restarting
            }
        }, 1500);
    </script>
</body>
</html>
